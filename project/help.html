{% extends "base.html" %}

{% block content %}
<h1>Помощь и контакты</h1>

<div class="contacts">
    {% for c in contacts %}
    <div class="contact-card">
        <h3>{{ c.role }}</h3>
        <p>Телефон: {{ c.phone }}</p>
        <p>Email: {{ c.email }}</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
